<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Selección - Portal de Acceso</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-100 via-sky-100 to-indigo-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white/80 backdrop-blur-md rounded-3xl shadow-xl border border-white/50 p-8 text-center space-y-8">
    <!-- Header -->
    <div class="space-y-3">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl shadow-inner">
        <i class="fa-solid fa-graduation-cap text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Evaluaciones Psicométricas</h1>
      <p class="text-sm text-gray-500">Selecciona el módulo de ingreso para iniciar.</p>
    </div>

    <!-- Entrance Options -->
    <div class="space-y-4">
      <!-- Candidate entrance -->
      <a href="rh.html" class="block w-full py-4 px-6 bg-blue-400 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 transition-all duration-300 flex items-center justify-center gap-3 group">
        <i class="fa-solid fa-user-tie text-lg"></i>
        <span>Portal de Candidatos</span>
        <i class="fa-solid fa-arrow-right ml-auto group-hover:translate-x-1 transition-transform"></i>
      </a>

      <!-- Recruiter entrance -->
      <a href="login.html" class="block w-full py-4 px-6 bg-white hover:bg-blue-50 text-blue-600 border border-blue-100 font-bold rounded-2xl shadow-sm transition-all duration-300 flex items-center justify-center gap-3 group">
        <i class="fa-solid fa-users-gear text-lg"></i>
        <span>Acceso Reclutadores (RH)</span>
        <i class="fa-solid fa-arrow-right ml-auto group-hover:translate-x-1 transition-transform"></i>
      </a>
    </div>

    <!-- Footer links -->
    <div class="text-[11px] text-gray-400">
      &copy; 2025 Recursos Humanos Inc. Todos los derechos reservados.
    </div>
  </div>

</body>
</html>
