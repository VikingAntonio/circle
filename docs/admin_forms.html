<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseñador de Formulario de Registro - Recursos Humanos</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
    }
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: rgba(239, 246, 255, 1);
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(147, 197, 253, 0.5);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-sky-50 to-indigo-50 min-h-screen flex flex-col justify-between">

  <!-- Header -->
  <header class="bg-white/80 backdrop-blur-md border-b border-blue-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="admin.html" class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center shadow-md hover:scale-105 transition">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
          <h1 class="text-xl font-bold text-gray-800">formularios</h1>
        </div>
      </div>
      <div>
        <a href="admin.html" class="px-4 py-2 text-sm font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-xl transition">
          Volver al Inicio
        </a>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-5xl w-full mx-auto p-4 sm:p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- LEFT: FIELD CONFIGURATOR & CREATOR -->
    <div class="lg:col-span-2 space-y-6">
      <div class="bg-white/90 backdrop-blur-md p-6 rounded-3xl border border-white shadow-sm space-y-6">
        <div>
          <h2 class="text-lg font-bold text-gray-800">formularios</h2>
        </div>

        <!-- Alert dynamic box -->
        <div id="alert-box" class="hidden bg-emerald-100 border border-emerald-200 text-emerald-800 px-4 py-3 rounded-2xl flex items-center justify-between text-sm shadow-sm">
          <span id="alert-msg">Guardado exitosamente.</span>
          <button onclick="document.getElementById('alert-box').classList.add('hidden')" class="hover:scale-110 transition"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- Dynamic Fields List -->
        <div id="fields-container" class="space-y-4 max-h-[400px] overflow-y-auto custom-scroll pr-1">
          <!-- Dynamically loaded inputs builder -->
        </div>

        <!-- Add Field Actions -->
        <div class="pt-4 border-t border-blue-50 space-y-3">
          <span class="text-xs font-bold text-gray-600 block"><i class="fa-solid fa-circle-plus text-blue-400 mr-1"></i> Insertar Nuevo Campo de Datos</span>
          <div class="flex flex-wrap gap-2">
            <button type="button" class="btn-add-field px-3 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-bold rounded-xl transition" data-type="text">
              <i class="fa-solid fa-font mr-1"></i> Texto Corto
            </button>
            <button type="button" class="btn-add-field px-3 py-2 bg-sky-50 hover:bg-sky-100 text-sky-700 text-xs font-bold rounded-xl transition" data-type="email">
              <i class="fa-solid fa-envelope mr-1"></i> Correo Electrónico
            </button>
            <button type="button" class="btn-add-field px-3 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold rounded-xl transition" data-type="number">
              <i class="fa-solid fa-arrow-1-9 mr-1"></i> Número
            </button>
            <button type="button" class="btn-add-field px-3 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-bold rounded-xl transition" data-type="select">
              <i class="fa-solid fa-caret-down mr-1"></i> Opciones de Selección
            </button>
            <button type="button" class="btn-add-field px-3 py-2 bg-pink-50 hover:bg-pink-100 text-pink-700 text-xs font-bold rounded-xl transition" data-type="textarea">
              <i class="fa-solid fa-align-left mr-1"></i> Cuadro de Texto Largo
            </button>
          </div>
        </div>

        <!-- Save button -->
        <div class="flex justify-end pt-4 border-t border-blue-50">
          <button type="button" id="btn-save-form" class="px-8 py-3.5 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-2xl text-sm shadow-lg shadow-blue-200 transition flex items-center gap-2">
            <i class="fa-solid fa-floppy-disk animate-bounce"></i> Guardar Formulario Dinámico
          </button>
        </div>
      </div>
    </div>

    <!-- RIGHT: INTERACTIVE LIVE PREVIEW -->
    <div class="bg-white/90 backdrop-blur-md p-6 rounded-3xl border border-white shadow-sm flex flex-col h-full space-y-4">
      <div class="border-b border-blue-100 pb-2">
        <h3 class="text-sm font-bold text-gray-800"><i class="fa-regular fa-eye mr-2 text-blue-400"></i>Vista Previa en Tiempo Real</h3>
        <p class="text-[10px] text-gray-400">Así es exactamente como el candidato visualizará este formulario de registro.</p>
      </div>

      <div class="flex-1 bg-blue-50/10 border border-blue-100/50 rounded-2xl p-4 overflow-y-auto max-h-[500px] custom-scroll">
        <div id="preview-container" class="space-y-4">
          <!-- Live inputs rendered here -->
        </div>
      </div>
    </div>

  </main>

  <footer class="bg-white border-t border-blue-100 py-4 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center text-xs text-gray-400">
      &copy; 2025 Recursos Humanos Inc. Todos los derechos reservados.
    </div>
  </footer>

  <script src="js/supabase.js"></script>
  <script src="js/admin_forms.js"></script>
</body>
</html>
